<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Real-Time Data Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  padding: 15px;
  background: #020617;
  display: flex;
  justify-content: space-between;
}

.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

h2 {
  margin-top: 0;
}

.data {
  font-size: 14px;
  margin-top: 10px;
}

.log {
  max-height: 150px;
  overflow-y: auto;
  background: black;
  padding: 10px;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
  <h1>📊 Real-Time Dashboard</h1>
  <button onclick="toggleAgent()">Start / Stop Agent</button>
</header>

<div class="container">

  <!-- CRYPTO -->
  <div class="card">
    <h2>💰 Crypto</h2>
    <div id="cryptoData" class="data"></div>
  </div>

  <!-- METEO -->
  <div class="card">
    <h2>🌦️ Météo (Paris)</h2>
    <div id="weatherData" class="data"></div>
  </div>

  <!-- NEWS -->
  <div class="card">
    <h2>📰 News (simulé)</h2>
    <div id="newsData" class="data"></div>
  </div>

  <!-- GRAPH -->
  <div class="card" style="grid-column: span 2;">
    <h2>📈 Analyse Score IA</h2>
    <canvas id="chart"></canvas>
  </div>

  <!-- LOGS -->
  <div class="card">
    <h2>📜 Logs</h2>
    <div id="logs" class="log"></div>
  </div>

</div>

<script>
let running = false;
let scores = [];
let chart;

function log(msg) {
  const logs = document.getElementById("logs");
  logs.innerHTML += "[" + new Date().toLocaleTimeString() + "] " + msg + "<br>";
  logs.scrollTop = logs.scrollHeight;
}

// ---------- API CALLS ----------

async function getCrypto() {
  const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd");
  return await res.json();
}

async function getWeather() {
  const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.85&longitude=2.35&current_weather=true");
  return await res.json();
}

// ---------- IA SIMULATION ----------

function analyzeData(value) {
  return Math.floor((value % 100));
}

// ---------- LOOP ----------

async function loop() {
  if (!running) return;

  log("Collecte des données...");

  try {
    const crypto = await getCrypto();
    const weather = await getWeather();

    const btc = crypto.bitcoin.usd;
    const eth = crypto.ethereum.usd;
    const temp = weather.current_weather.temperature;

    document.getElementById("cryptoData").innerHTML =
      "BTC: $" + btc + "<br>ETH: $" + eth;

    document.getElementById("weatherData").innerHTML =
      "Température: " + temp + "°C";

    // News simulées
    const fakeNews = [
      "Marché en hausse 📈",
      "Crypto volatile ⚠️",
      "Nouvelle IA lancée 🤖",
      "Tensions économiques 🌍"
    ];
    const news = fakeNews[Math.floor(Math.random()*fakeNews.length)];
    document.getElementById("newsData").innerText = news;

    // Analyse IA
    const score = analyzeData(btc);
    scores.push(score);

    updateChart(score);

    log("Données traitées | score: " + score);

  } catch(e) {
    log("Erreur: " + e.message);
  }

  setTimeout(loop, 4000);
}

// ---------- CONTROL ----------

function toggleAgent() {
  running = !running;
  log(running ? "Agent lancé" : "Agent stoppé");
  if (running) loop();
}

// ---------- CHART ----------

function initChart() {
  const ctx = document.getElementById("chart");
  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        label: "Score IA",
        data: []
      }]
    }
  });
}

function updateChart(score) {
  chart.data.labels.push("");
  chart.data.datasets[0].data.push(score);
  chart.update();
}

initChart();

</script>

</body>
</html>
